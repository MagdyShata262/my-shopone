<mat-toolbar color="primary" class="app-toolbar">
  <mat-icon class="logo-icon">restaurant_menu</mat-icon>
  <span>Smart Recipe Box</span>
  <span class="spacer"></span>
  <app-theme-switcher></app-theme-switcher>
</mat-toolbar>

<main class="content-area">
  @if (selectedProductId(); as id) {
  <app-product-detail [productId]="id" (close)="onDetailClose()"></app-product-detail>
  } @else {
  <div class="search-section">
    <app-product-search></app-product-search>
    <app-category-filter></app-category-filter>
  </div>

  <app-product-list (productSelected)="onProductSelected($event)"></app-product-list>
  }
</main>

<footer class="app-footer">
  <p>&copy; 2026 Smart Recipe Box. Powered by Angular 21.</p>
</footer>
